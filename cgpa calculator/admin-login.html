<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Department CGPA Calculator</title>
  <meta name="description" content="Admin Authentication Portal for Department CGPA Calculator Management System.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="brand-icon">🛡️</div>
        <h2>Admin Authentication</h2>
        <p>Enter your Administrator credentials to manage department databases.</p>
      </div>

      <form id="admin-login-form">
        <div class="form-group">
          <label for="admin-username">Admin Username <span class="required">*</span></label>
          <input type="text" id="admin-username" class="form-control" placeholder="e.g. admin" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="admin-password">Password <span class="required">*</span></label>
          <input type="password" id="admin-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Sign In to Admin Portal
        </button>
      </form>

      <!-- Default Credentials Demo Hint -->
      <div style="margin-top: 1.5rem; padding: 0.9rem; background-color: var(--primary-light); border-radius: var(--border-radius-md); font-size: 0.8rem; color: var(--text-secondary);">
        <strong>Demo Admin Credentials:</strong><br>
        Username: <code id="admin-user-hint">admin</code> | Password: <code id="admin-pass-hint">cybersecurity@007</code>
      </div>

      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="index.html" style="font-size: 0.85rem; color: var(--text-secondary);">← Back to Landing Page</a>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script>
    // Dynamically sync hint box with active stored credentials
    document.addEventListener('DOMContentLoaded', () => {
      const activeAdmin = DB.get(StorageKeys.ADMIN);
      if (activeAdmin) {
        document.getElementById('admin-user-hint').textContent = activeAdmin.username;
        document.getElementById('admin-pass-hint').textContent = activeAdmin.password;
      }
    });

    document.getElementById('admin-login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('admin-username').value;
      const pass = document.getElementById('admin-password').value;

      const res = Auth.loginAdmin(user, pass);
      if (res.success) {
        showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'admin-dashboard.html';
        }, 800);
      } else {
        showToast(res.message, 'danger');
      }
    });
  </script>
</body>
</html>
